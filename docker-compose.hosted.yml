# Hosted Streamable HTTP MCP — always on port 3009 inside the container.
# Usage:
#   docker compose -f docker-compose.hosted.yml up --build -d
#   curl http://127.0.0.1:3009/health

services:
  convocore-mcp-hosted:
    build:
      context: .
      dockerfile: Dockerfile.hosted
    image: convocore-mcp-hosted:latest
    container_name: convocore-mcp-hosted
    ports:
      - "3009:3009"
    environment:
      - HOST=0.0.0.0
      - PORT=3009
      - MCP_HTTP_PATH=/mcp
      - CONVOCORE_API_REGION=${CONVOCORE_API_REGION:-eu-gcp}
      - CONVOCORE_HOSTED_ALLOWED_HOSTS=${CONVOCORE_HOSTED_ALLOWED_HOSTS:-}
      - CONVOCORE_HOSTED_DNS_PROTECTION=${CONVOCORE_HOSTED_DNS_PROTECTION:-false}
      - CONVOCORE_HOSTED_SESSION_IDLE_MS=${CONVOCORE_HOSTED_SESSION_IDLE_MS:-1800000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3009/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
